name: ai-audio-studio

networks:
  studio-net:
    driver: bridge

volumes:
  ollama-data:
  postgres-data:
  n8n-data:
  shared-projects:
  local-deliveries:
  draft-queue:
  approval-queue:

services:

  # ── Postgres (shared DB for all services) ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-studiodb}
      POSTGRES_USER: ${POSTGRES_USER:-studio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/00-create-databases.sql:/docker-entrypoint-initdb.d/00-create-databases.sql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks: [studio-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:5432:5432"

  # ── Ollama (local LLM serving — no cloud calls) ────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    networks: [studio-net]
    environment:
      OLLAMA_HOST: 0.0.0.0
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:11434:11434"

  # ── Ollama model initialiser (pulls required models on first boot) ──────
  ollama-init:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    networks: [studio-net]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      sh -c "
        ollama pull ${PLANNER_MODEL:-qwen2.5:14b-instruct} &&
        ollama pull ${CLASSIFIER_MODEL:-qwen2.5:3b} &&
        ollama pull ${EMBED_MODEL:-nomic-embed-text} &&
        echo 'All models ready'
      "
    restart: "no"

  # ── n8n (workflow automation and webhooks) ─────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${N8N_DB:-n8ndb}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-studio}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:?N8N_PASSWORD is required}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 336  # 14 days
      N8N_BOOTSTRAP_STATUS_PATH: /home/node/.n8n/bootstrap-status.json
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
      - ./n8n/import-workflows.mjs:/bootstrap/import-workflows.mjs:ro
    networks: [studio-net]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:5678:5678"

  # ── Project State Service ──────────────────────────────────────────────
  project-state:
    build:
      context: ../services/project-state
      dockerfile: Dockerfile
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-studio}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres/${POSTGRES_DB:-studiodb}
      APPROVAL_QUEUE_PATH: /data/approval-queue
      OPERATOR_API_TOKEN: ${OPERATOR_API_TOKEN:-change-me-operator-token}
      WORKER_API_TOKEN: ${WORKER_API_TOKEN:-change-me-worker-token}
      PORT: "8080"
    volumes:
      - shared-projects:/data/projects
      - approval-queue:/data/approval-queue
    networks: [studio-net]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:8080:8080"

  # ── CRM API ───────────────────────────────────────────────────────────
  crm-api:
    build:
      context: ../services/crm-api
      dockerfile: Dockerfile
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-studio}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres/${POSTGRES_DB:-studiodb}
      PORT: "8090"
    networks: [studio-net]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:8090:8090"

  # ── OpenClaw Orchestrator ──────────────────────────────────────────────
  openclaw:
    build:
      context: ../services/openclaw-orchestrator
      dockerfile: Dockerfile
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      PROJECT_STATE_URL: http://project-state:8080
      CRM_API_URL: http://crm-api:8090
      PLANNER_MODEL: ${PLANNER_MODEL:-qwen2.5:14b-instruct}
      CLASSIFIER_MODEL: ${CLASSIFIER_MODEL:-qwen2.5:3b}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-studio}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres/${POSTGRES_DB:-studiodb}
      POLICY_ENFORCEMENT: ${POLICY_ENFORCEMENT:-strict}
      N8N_BOOTSTRAP_STATUS_PATH: /data/n8n/bootstrap-status.json
      PORT: "8100"
    volumes:
      - ../services/openclaw-orchestrator/prompts:/app/prompts:ro
      - shared-projects:/data/projects
      - draft-queue:/data/draft-queue
      - approval-queue:/data/approval-queue
      - n8n-data:/data/n8n:ro
    networks: [studio-net]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      project-state:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:8100:8100"

  # ── Content Pipeline (social drafting) ────────────────────────────────
  content-pipeline:
    build:
      context: ../services/content-pipeline
      dockerfile: Dockerfile
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      PLANNER_MODEL: ${PLANNER_MODEL:-qwen2.5:14b-instruct}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-studio}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres/${POSTGRES_DB:-studiodb}
      PROJECT_STATE_URL: http://project-state:8080
      DRAFT_QUEUE_PATH: /data/draft-queue
      PORT: "8110"
    volumes:
      - draft-queue:/data/draft-queue
      - shared-projects:/data/projects
    networks: [studio-net]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      project-state:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8110/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:8110:8110"

  # ── Audio QC Service ───────────────────────────────────────────────────
  audio-qc:
    build:
      context: ../services/audio-qc
      dockerfile: Dockerfile
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-studio}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres/${POSTGRES_DB:-studiodb}
      PROJECT_STATE_URL: http://project-state:8080
      SHARED_PROJECTS_PATH: /data/projects
      PORT: "8120"
    volumes:
      - shared-projects:/data/projects
    networks: [studio-net]
    depends_on:
      postgres:
        condition: service_healthy
      project-state:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8120/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:8120:8120"

  # ── Workers (HTTP-triggered via n8n webhooks) ─────────────────────────

  lead-intake:
    build:
      context: ../workers/lead-intake
      dockerfile: Dockerfile
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      PLANNER_MODEL: ${PLANNER_MODEL:-qwen2.5:14b-instruct}
      CLASSIFIER_MODEL: ${CLASSIFIER_MODEL:-qwen2.5:3b}
      PROJECT_STATE_URL: http://project-state:8080
      CRM_API_URL: http://crm-api:8090
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-studio}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres/${POSTGRES_DB:-studiodb}
      ENGINEER_NAME: ${ENGINEER_NAME:-Engineer}
      ENGINEER_VOICE: ${ENGINEER_VOICE:-Warm, direct, and professional.}
      PORT: "8130"
    volumes:
      - ../services/openclaw-orchestrator/prompts:/app/prompts:ro
    networks: [studio-net]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      project-state:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8130/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:8130:8130"

  inbox-triage:
    build:
      context: ../workers/inbox-triage
      dockerfile: Dockerfile
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      CLASSIFIER_MODEL: ${CLASSIFIER_MODEL:-qwen2.5:3b}
      PLANNER_MODEL: ${PLANNER_MODEL:-qwen2.5:14b-instruct}
      PROJECT_STATE_URL: http://project-state:8080
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-studio}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres/${POSTGRES_DB:-studiodb}
      ENGINEER_NAME: ${ENGINEER_NAME:-Engineer}
      ENGINEER_VOICE: ${ENGINEER_VOICE:-Warm, direct, and professional.}
      ALLOWED_INBOX_LABELS: ${ALLOWED_INBOX_LABELS:-NeedsReply}
      PORT: "8140"
    volumes:
      - ../services/openclaw-orchestrator/prompts:/app/prompts:ro
    networks: [studio-net]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      project-state:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8140/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:8140:8140"

  session-prep:
    build:
      context: ../workers/session-prep
      dockerfile: Dockerfile
    environment:
      PROJECT_STATE_URL: http://project-state:8080
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-studio}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres/${POSTGRES_DB:-studiodb}
      WATCHED_STEMS_PATH: /data/incoming-stems
      SHARED_PROJECTS_PATH: /data/projects
      PORT: "8150"
    volumes:
      - shared-projects:/data/projects
    networks: [studio-net]
    depends_on:
      postgres:
        condition: service_healthy
      project-state:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8150/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:8150:8150"

  revision-parser:
    build:
      context: ../workers/revision-parser
      dockerfile: Dockerfile
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      PLANNER_MODEL: ${PLANNER_MODEL:-qwen2.5:14b-instruct}
      PROJECT_STATE_URL: http://project-state:8080
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-studio}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres/${POSTGRES_DB:-studiodb}
      SHARED_PROJECTS_PATH: /data/projects
      PORT: "8160"
    volumes:
      - ../services/openclaw-orchestrator/prompts:/app/prompts:ro
      - shared-projects:/data/projects
    networks: [studio-net]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      project-state:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8160/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:8160:8160"

  delivery-packager:
    build:
      context: ../workers/delivery-packager
      dockerfile: Dockerfile
    environment:
      PROJECT_STATE_URL: http://project-state:8080
      AUDIO_QC_URL: http://audio-qc:8120
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-studio}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres/${POSTGRES_DB:-studiodb}
      SHARED_PROJECTS_PATH: /data/projects
      DELIVERY_PATH: /data/deliveries
      PORT: "8170"
    volumes:
      - shared-projects:/data/projects
    networks: [studio-net]
    depends_on:
      postgres:
        condition: service_healthy
      project-state:
        condition: service_healthy
      audio-qc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8170/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:8170:8170"

  # ── Studio Brain UI ────────────────────────────────────────────────────
  studio-brain-ui:
    build:
      context: ../apps/studio-brain-ui
      dockerfile: Dockerfile
    networks: [studio-net]
    restart: unless-stopped
    depends_on:
      project-state:
        condition: service_healthy
      crm-api:
        condition: service_healthy
      openclaw:
        condition: service_healthy
      n8n:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:3000:3000"

  mix-planner:
    build:
      context: ../workers/mix-planner
      dockerfile: Dockerfile
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      PLANNER_MODEL: ${PLANNER_MODEL:-qwen2.5:14b-instruct}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-studio}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres/${POSTGRES_DB:-studiodb}
      PROJECT_STATE_URL: http://project-state:8080
      SHARED_PROJECTS_PATH: /data/projects
      PORT: "8180"
    volumes:
      - shared-projects:/data/projects
    networks: [studio-net]
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      project-state:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8180/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:8180:8180"

  studio-worker:
    profiles: ["local-worker"]
    build:
      context: ../services/studio-worker
      dockerfile: Dockerfile
    environment:
      PROJECT_STATE_URL: http://project-state:8080
      WORKER_SLUG: ${LOCAL_WORKER_SLUG:-local-studio-worker}
      WORKER_DISPLAY_NAME: ${LOCAL_WORKER_DISPLAY_NAME:-Local Studio Worker}
      WORKER_PLATFORM: macos
      WORKER_API_BASE_URL: http://studio-worker:8190
      WORKER_CAPABILITIES: ${LOCAL_WORKER_CAPABILITIES:-session-prep,revision-parser,delivery-packager,execute-soundflow,execute-reascript}
      SHARED_PROJECTS_PATH: /data/projects
      DELIVERY_PATH: /data/deliveries
      PATH_TRANSLATION_JSON: "{}"
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-5}
      STUDIO_WORKER_DRY_RUN_DAW: ${STUDIO_WORKER_DRY_RUN_DAW:-true}
      WORKER_API_TOKEN: ${WORKER_API_TOKEN:-change-me-worker-token}
      AUDIO_QC_URL: http://audio-qc:8120
      PORT: "8190"
    volumes:
      - shared-projects:/data/projects
      - local-deliveries:/data/deliveries
    networks: [studio-net]
    depends_on:
      project-state:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8190/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_HOST:-127.0.0.1}:8190:8190"
