volumes:
  caddy-data:
  caddy-config:

services:
  caddy:
    image: caddy:2-alpine
    depends_on:
      studio-brain-ui:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [studio-net]
