        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/audio-qc/ {
        set $audio_qc http://audio-qc:8120;
        rewrite ^/api/audio-qc/(.*)$ /$1 break;
        proxy_pass $audio_qc;
