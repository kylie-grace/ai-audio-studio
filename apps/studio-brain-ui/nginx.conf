        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/inbox-triage/ {
        set $inbox_triage http://inbox-triage:8140;
        rewrite ^/api/inbox-triage/(.*)$ /$1 break;
        proxy_pass $inbox_triage;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/session-prep/ {
        set $session_prep http://session-prep:8150;
        rewrite ^/api/session-prep/(.*)$ /$1 break;
        proxy_pass $session_prep;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
