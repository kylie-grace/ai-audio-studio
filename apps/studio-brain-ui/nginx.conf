server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 ipv6=off valid=30s;

    location /api/project-state/ {
        set $project_state http://project-state:8080;
        rewrite ^/api/project-state/(.*)$ /$1 break;
        proxy_pass $project_state;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/crm/ {
        set $crm_api http://crm-api:8090;
        rewrite ^/api/crm/(.*)$ /$1 break;
        proxy_pass $crm_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/openclaw/ {
        set $openclaw http://openclaw:8100;
        rewrite ^/api/openclaw/(.*)$ /$1 break;
        proxy_pass $openclaw;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/n8n/ {
        set $n8n http://n8n:5678;
        rewrite ^/api/n8n/(.*)$ /$1 break;
        proxy_pass $n8n;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ollama/ {
        set $ollama http://ollama:11434;
        rewrite ^/api/ollama/(.*)$ /$1 break;
        proxy_pass $ollama;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/content-pipeline/ {
        set $content_pipeline http://content-pipeline:8110;
        rewrite ^/api/content-pipeline/(.*)$ /$1 break;
