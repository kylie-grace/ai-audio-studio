    }

    location /api/delivery-packager/ {
        set $delivery_packager http://delivery-packager:8170;
        rewrite ^/api/delivery-packager/(.*)$ /$1 break;
        proxy_pass $delivery_packager;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/mix-planner/ {
        set $mix_planner http://mix-planner:8180;
        rewrite ^/api/mix-planner/(.*)$ /$1 break;
        proxy_pass $mix_planner;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/studio-worker/ {
        set $studio_worker http://studio-worker:8190;
        rewrite ^/api/studio-worker/(.*)$ /$1 break;
        proxy_pass $studio_worker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
